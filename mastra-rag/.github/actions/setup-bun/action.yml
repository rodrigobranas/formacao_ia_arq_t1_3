name: "Setup Bun Environment"
description: "Sets up Bun with caching and dependency installation for Dash projects"
author: "Dash Team"

inputs:
  bun-version:
    description: "Bun version to install"
    required: false
    default: "latest"
  install-dependencies:
    description: "Install dependencies with bun install"
    required: false
    default: "true"

outputs:
  bun-version:
    description: "The Bun version that was installed"
    value: ${{ steps.setup-bun.outputs.bun-version }}

runs:
  using: "composite"
  steps:
    - name: Set up Bun
      id: setup-bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        echo "Installing dependencies with bun..."
        bun install --frozen-lockfile

    - name: Report setup status
      shell: bash
      run: |-
        echo "Bun setup completed successfully!"
        echo "Bun version: $(bun --version)"
        echo "Dependencies installed: ${{ inputs.install-dependencies }}"
